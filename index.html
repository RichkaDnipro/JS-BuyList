<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy List</title>
    <link rel="stylesheet" href="main.css">
    <script src="logic.js" defer></script>
</head>
<body>

    <div class="container">
        <main class="card shopping-list">
            <header class="input-section">
                <input type="text" id="new-product-name" placeholder="Назва товару" autofocus>
                <button class="btn-add" id="btn-add-product" data-tooltip="Додати товар">Додати</button>
            </header>

            <div id="products-container"></div>
        </main>

        <aside class="card summary-card">
            <section>
                <h2>Залишилося</h2>
                <div id="remain-container"></div>
            </section>
            
            <section>
                <h2>Куплено</h2>
                <div id="bought-container"></div>
            </section>
        </aside>
    </div>

    <footer class="badge" aria-label="Author">
        <span class="badge-title">Buy List</span>
        <span class="badge-author">Хомініч Катерина</span>
    </footer>
</body>
</html>
